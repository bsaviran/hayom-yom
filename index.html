<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היום יום</title>
    <meta property="og:description" content="קריאת היום יום של הרבי מלובביץ׳.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23c9a84c'/%3E%3Cstop offset='100%25' stop-color='%23e8c97a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='serif' font-size='56' font-weight='900' fill='%2305101f'%3E%D7%99%3C/text%3E%3C/svg%3E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="היום יום">
    <meta name="theme-color" content="#0a1628">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: rgba(201,168,76,0.15);
            --deep: #05101f;
            --navy: #0a1628;
            --navy-mid: #112240;
            --navy-light: #1a3358;
            --text: #f0e8d6;
            --text-dim: #8aa0b8;
            --silver: #8fa3bc;
            --silver-dim: rgba(143,163,188,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(26,51,88,0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(10,22,40,0.9) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* === HEADER === */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5,16,31,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 0 2rem;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--deep);
            box-shadow: 0 0 20px rgba(201,168,76,0.3);
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            display: block;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            color: var(--gold);
            font-family: 'Heebo', sans-serif;
            font-weight: 400;
            line-height: 1.2;
            display: block;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-whatsapp {
            width: 42px;
            height: 42px;
            background: rgba(37,211,102,0.15);
            border: 1px solid rgba(37,211,102,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #25d366;
        }
        .btn-whatsapp:hover { background: rgba(37,211,102,0.25); transform: scale(1.08); }

        .btn-today {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--deep);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(201,168,76,0.25);
            white-space: nowrap;
        }
        .btn-today:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }

        /* === MAIN === */
        main {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem 5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.5s ease forwards; }

        /* === RABBI TRIBUTE === */
        .rabbi-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .rabbi-frame-outer {
            display: inline-block;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            padding: 30px;
            margin: -30px;
        }

        .rabbi-glow {
            position: absolute;
            inset: -30px;
            background: radial-gradient(ellipse at center, rgba(201,168,76,0.3) 0%, transparent 70%);
            border-radius: 24px;
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .rabbi-frame {
            width: 300px;
            height: 380px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow:
                0 0 0 6px rgba(201,168,76,0.15),
                0 0 0 12px rgba(201,168,76,0.07),
                0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            z-index: 1;
            display: block;
        }

        .rabbi-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: sepia(10%) brightness(0.95) contrast(1.05);
            transition: transform 0.6s ease;
        }

        .rabbi-frame:hover img { transform: scale(1.04); }

        .rabbi-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 1.4rem 0 0.6rem;
        }

        .rabbi-ornament-line {
            height: 1px;
            width: 80px;
            background: linear-gradient(to var(--d), transparent, rgba(201,168,76,0.5));
        }
        .rabbi-ornament-line.left { --d: left; }
        .rabbi-ornament-line.right { --d: right; }

        .rabbi-ornament-star { color: var(--gold); font-size: 1rem; letter-spacing: 0.2em; }

        .rabbi-name {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold-light);
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .rabbi-sub {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.7;
        }

        .rabbi-zl {
            font-size: 0.8rem;
            color: rgba(201,168,76,0.6);
            margin-top: 0.3rem;
            font-family: 'Noto Serif Hebrew', serif;
            text-align: center;
        }

        /* === BOOK TITLE BANNER === */
        .book-banner {
            position: relative;
            max-width: 680px;
            margin: 0 auto 2.5rem;
            text-align: center;
            padding: 1.8rem 2.5rem;
        }

        .book-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, rgba(17,34,64,0.7) 50%, rgba(201,168,76,0.1) 100%);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 20px;
        }

        .book-banner-shimmer {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            overflow: hidden;
            pointer-events: none;
        }

        .book-banner-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.06) 50%, transparent 100%);
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(100%); }
        }

        .book-title-he {
            position: relative;
            z-index: 1;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.08em;
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
            margin-bottom: 0.4rem;
        }

        .book-subtitle-he {
            position: relative;
            z-index: 1;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        /* === DATE SELECTOR === */
        .ornament-divider {
            text-align: center;
            margin: 2.5rem 0;
            position: relative;
        }
        .ornament-divider::before, .ornament-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: linear-gradient(to var(--dir, left), transparent, rgba(201,168,76,0.4));
        }
        .ornament-divider::before { right: 0; --dir: right; }
        .ornament-divider::after { left: 0; --dir: left; }
        .ornament-divider span {
            color: var(--gold);
            font-size: 1.4rem;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3em;
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1.2rem;
        }

        .month-nav-btn {
            width: 38px;
            height: 38px;
            background: var(--navy-mid);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 50%;
            color: var(--gold);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .month-nav-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

        .month-label {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gold-light);
            min-width: 200px;
            text-align: center;
            line-height: 1.3;
        }

        .month-label-sub {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-family: 'Heebo', sans-serif;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }

        .calendar-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.2rem;
            text-align: center;
            font-weight: 500;
        }

        /* Day-of-week headers */
        .days-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 7px;
            margin-bottom: 6px;
        }
        .day-header-cell {
            text-align: center;
            font-size: 0.62rem;
            color: var(--gold);
            font-family: 'Noto Serif Hebrew', serif;
            font-weight: 700;
            padding: 4px 2px;
            letter-spacing: 0.05em;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 7px;
            margin-bottom: 2rem;
        }

        @media (max-width: 500px) {
            .days-grid, .days-header { grid-template-columns: repeat(7, 1fr); gap: 4px; }
        }

        /* Empty cells for offset */
        .day-empty {
            background: transparent;
            border: none;
        }

        .day-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201,168,76,0.12);
            border-radius: 13px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .day-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-dim), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }

        .day-card:hover::before, .day-card.today::before, .day-card.selected::before { opacity: 1; }

        .day-card:hover, .day-card.today, .day-card.selected {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(201,168,76,0.1);
        }

        .day-card.today {
            box-shadow: 0 0 0 1px var(--gold), 0 8px 25px rgba(201,168,76,0.2);
        }

        .day-card.selected {
            background: rgba(201,168,76,0.15);
        }

        .today-badge {
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--deep);
            font-size: 0.38rem;
            font-weight: 700;
            padding: 1px 4px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .day-num {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            position: relative;
            z-index: 1;
        }

        .day-card.today .day-num, .day-card.selected .day-num { color: var(--gold-light); }

        .day-greg {
            font-family: 'Heebo', sans-serif;
            font-size: 0.55rem;
            color: var(--text-dim);
            position: relative;
            z-index: 1;
            margin-top: 2px;
            opacity: 0.7;
        }



        /* === CONTENT CARD === */
        .content-card {
            background: linear-gradient(160deg, var(--navy-mid) 0%, rgba(10,22,40,0.95) 100%);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
        }

        .card-topbar {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            box-shadow: 0 0 20px rgba(201,168,76,0.5);
        }

        .card-inner {
            padding: 2.5rem 2rem;
        }

        @media (min-width: 600px) { .card-inner { padding: 3.5rem 4rem; } }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
        .empty-text {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.4rem;
            color: var(--text-dim);
            line-height: 1.7;
        }
        .empty-hint { margin-top: 0.8rem; font-size: 0.85rem; color: var(--gold); opacity: 0.7; }

        .entry-date-line {
            text-align: center;
            margin-bottom: 2rem;
        }

        .entry-date-heb {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
            letter-spacing: 0.04em;
        }

        .entry-date-greg {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .entry-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1rem auto;
        }

        .entry-body {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.45rem;
            line-height: 2.4;
            color: var(--text);
            text-align: right;
        }

        @media (min-width: 600px) { .entry-body { font-size: 1.65rem; } }

        .entry-source {
            margin-top: 2rem;
            text-align: center;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.85rem;
            color: rgba(201,168,76,0.6);
            font-style: italic;
        }



        .day-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(201,168,76,0.15);
        }

        .nav-btn {
            background: none;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 12px;
            color: var(--gold);
            padding: 10px 18px;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover { background: var(--gold-dim); border-color: var(--gold); transform: translateY(-1px); }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

        .day-counter { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }

        #loader {
            text-align: center;
            padding: 5rem;
            display: none;
        }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(201,168,76,0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--text-dim); font-family: 'Noto Serif Hebrew', serif; font-size: 1.1rem; }

        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(201,168,76,0.1);
            padding: 2rem;
            text-align: center;
            background: rgba(5,16,31,0.6);
        }
        .footer-text { font-size: 0.8rem; color: var(--text-dim); }
        .footer-text span { color: var(--gold); }

        @media (max-width: 480px) {
            header { padding: 0 1rem; }
            .header-inner { height: 60px; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.1rem; border-radius: 9px; }
            .logo-text { font-size: 0.9rem; }
            .logo-subtitle { font-size: 0.55rem; }
            .btn-today { padding: 8px 12px; font-size: 0.75rem; }
            .btn-whatsapp { width: 36px; height: 36px; }
            main { padding: 1.5rem 1rem 4rem; }
            .rabbi-frame { width: 240px; height: 300px; border-radius: 16px; }
            .rabbi-name { font-size: 1.2rem; }
            .book-title-he { font-size: 1.7rem; }
            .book-banner { padding: 1.4rem 1.2rem; }
            .card-inner { padding: 1.8rem 1.2rem; }
            .entry-body { font-size: 1.2rem; line-height: 2.2; }
            .entry-date-heb { font-size: 1.3rem; }
            .ornament-divider { margin: 1.5rem 0; }
            .day-num { font-size: 0.85rem; }
            .day-greg { font-size: 0.48rem; }
            .day-header-cell { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">י</div>
                <div>
                    <span class="logo-text">היום יום</span>
                    <span class="logo-subtitle">מוקדש להצלחת חיילי צה״ל</span>
                </div>
            </div>
            <div class="header-actions">

    <script>
        // ===== HEBREW CALENDAR ENGINE =====
        const GREGORIAN_MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
        const DOW_HE = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];

        function toGematria(num) {
            const letters = {1:'א',2:'ב',3:'ג',4:'ד',5:'ה',6:'ו',7:'ז',8:'ח',9:'ט',10:'י',20:'כ',30:'ל',40:'מ',50:'נ',60:'ס',70:'ע',80:'פ',90:'צ',100:'ק',200:'ר',300:'ש',400:'ת'};
            if (num <= 10) return letters[num];
            if (num < 100) {
                let tens = Math.floor(num/10)*10, units = num%10;
                let res = letters[tens] + (units ? letters[units] : '');
                return res.replace('יה','טו').replace('יו','טז');
            }
            if (num < 200) return letters[100] + (num-100 ? toGematria(num-100) : '');
            if (num < 300) return letters[200] + (num-200 ? toGematria(num-200) : '');
            if (num < 400) return letters[300] + (num-300 ? toGematria(num-300) : '');
            return num.toString();
        }

        function hebrewIsLeap(y) { return ((7*y)+1)%19 < 7; }
        function hebrewElapsed(y) {
            const m = 235*Math.floor((y-1)/19)+12*((y-1)%19)+Math.floor((7*((y-1)%19)+1)/19);
            const p = 204+793*(m%1080);
            const h = 5+12*m+793*Math.floor(m/1080)+Math.floor(p/1080);
            const d = 1+29*m+Math.floor(h/24), pts = 1080*(h%24)+(p%1080);
            let ad = d;
            if(pts>=19440||(d%7===2&&pts>=9924&&!hebrewIsLeap(y))||(d%7===1&&pts>=16789&&hebrewIsLeap(y-1))) ad=d+1;
            if(ad%7===0||ad%7===3||ad%7===5) return ad+1;
            return ad;
        }
        function hebrewYearStart(y) { return hebrewElapsed(y)+347997; }
        function hebrewMonthDays(y, m) {
            if([2,4,6,10,13].includes(m)) return 29;
            if(m===12&&!hebrewIsLeap(y)) return 29;
            if(m===8&&(hebrewElapsed(y+1)-hebrewElapsed(y))%10!==5) return 29;
            if(m===9&&(hebrewElapsed(y+1)-hebrewElapsed(y))%10===3) return 29;
            return 30;
        }
        function hebrewMonthsInYear(y) { return hebrewIsLeap(y) ? 13 : 12; }
        function dateToJDN(gYear, gMonth, gDay) {
            const a=Math.floor((14-gMonth)/12), y=gYear+4800-a, mo=gMonth+12*a-3;
            return gDay+Math.floor((153*mo+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
        }
        function jdnToHebrew(jdn) {
            let hYear = Math.floor((jdn-347997)*98496/35975351)+1;
            while(hebrewYearStart(hYear+1)<=jdn) hYear++;
            if(hebrewYearStart(hYear)>jdn) hYear--;
            const dayOfYear = jdn-hebrewYearStart(hYear)+1;
            const months = hebrewMonthsInYear(hYear);
            let days=0, hMonth=1;
            for(let i=1;i<=months;i++){
                const md=hebrewMonthDays(hYear,i);
                if(days+md>=dayOfYear){hMonth=i;break;}
                days+=md;
            }
            const hDay = dayOfYear-days;
            return {year:hYear, month:hMonth, day:hDay, months};
        }
        function getHebrewDate(date) {
            const jdn = dateToJDN(date.getFullYear(), date.getMonth()+1, date.getDate());
            return jdnToHebrew(jdn);
        }

        // Convert Hebrew date back to Gregorian JDN
        function hebrewToJDN(hYear, hMonth, hDay) {
            let jdn = hebrewYearStart(hYear);
            for(let m=1; m<hMonth; m++) jdn += hebrewMonthDays(hYear, m);
            jdn += hDay - 1;
            return jdn;
        }
        function jdnToGregorian(jdn) {
            let a = jdn + 32044;
            let b = Math.floor((4*a+3)/146097);
            let c = a - Math.floor(146097*b/4);
            let d = Math.floor((4*c+3)/1461);
            let e = c - Math.floor(1461*d/4);
            let m = Math.floor((5*e+2)/153);
            let day = e - Math.floor((153*m+2)/5) + 1;
            let month = m + 3 - 12*Math.floor(m/10);
            let year = 100*b + d - 4800 + Math.floor(m/10);
            return new Date(year, month-1, day);
        }

        function hebrewMonthName(hYear, hMonth) {
            if(!hebrewIsLeap(hYear)) {
                const names=['תשרי','חשון','כסלו','טבת','שבט','אדר','ניסן','אייר','סיון','תמוז','אב','אלול'];
                return names[hMonth-1] || '';
            } else {
                const names=['תשרי','חשון','כסלו','טבת','שבט','אדר א׳','אדר ב׳','ניסן','אייר','סיון','תמוז','אב','אלול'];
                return names[hMonth-1] || '';
            }
        }

        // ===== STATE =====
        const today = new Date();
        const todayHeb = getHebrewDate(today);

        // Current Hebrew month being viewed
        let viewHYear = todayHeb.year;
        let viewHMonth = todayHeb.month;

        // Selected Hebrew date
        let selectedHYear = null;
        let selectedHMonth = null;
        let selectedHDay = null;



        // ===== BUILD CALENDAR =====
        function buildCalendar() {
            const hYear = viewHYear;
            const hMonth = viewHMonth;
            const monthName = hebrewMonthName(hYear, hMonth);
            const daysInMonth = hebrewMonthDays(hYear, hMonth);

            // Hebrew year in gematria
            const yearGem = toYearGematria(hYear);
            document.getElementById('monthLabelMain').textContent = `${monthName} ${yearGem}`;

            // Show Gregorian range for this Hebrew month
            const startGreg = jdnToGregorian(hebrewToJDN(hYear, hMonth, 1));
            const endGreg = jdnToGregorian(hebrewToJDN(hYear, hMonth, daysInMonth));
            const gregRange = formatGregRange(startGreg, endGreg);
            document.getElementById('monthLabelSub').textContent = gregRange;

            // Day of week headers
            const header = document.getElementById('daysHeader');
            header.innerHTML = '';
            const dowNames = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
            dowNames.forEach(d => {
                const cell = document.createElement('div');
                cell.className = 'day-header-cell';
                cell.textContent = d;
                header.appendChild(cell);
            });

            // First day of month DOW (Sunday=0)
            const firstDOW = startGreg.getDay(); // 0=Sun

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Empty cells for offset
            for(let i=0; i<firstDOW; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-empty';
                grid.appendChild(empty);
            }

            // Day cells
            for(let d=1; d<=daysInMonth; d++) {
                const gregDate = jdnToGregorian(hebrewToJDN(hYear, hMonth, d));
                const isToday = hYear===todayHeb.year && hMonth===todayHeb.month && d===todayHeb.day;
                const isSelected = hYear===selectedHYear && hMonth===selectedHMonth && d===selectedHDay;

                const card = document.createElement('div');
                card.className = 'day-card' +
                    (isToday ? ' today' : '') +
                    (isSelected ? ' selected' : '');

                const gregLabel = `${gregDate.getDate()}/${gregDate.getMonth()+1}`;

                card.innerHTML =
                    (isToday ? '<div class="today-badge">היום</div>' : '') +
                    `<div class="day-num" ${isToday ? 'style="margin-top:12px"' : ''}>${toGematria(d)}</div>` +
                    `<div class="day-greg">${gregLabel}</div>`;

                card.onclick = () => selectHebDate(hYear, hMonth, d);
                grid.appendChild(card);
            }
        }

        function toYearGematria(y) {
            // Show last 3 digits in gematria with ה׳ prefix for thousands
            const mod = y % 1000;
            const hundreds = Math.floor(mod / 100);
            const rest = mod % 100;
            let result = '';
            if(hundreds > 0) {
                const h = {1:'ק',2:'ר',3:'ש',4:'ת',5:'ת׳ק',6:'ת׳ר',7:'ת׳ש',8:'ת׳ת'}[hundreds] || '';
                result += h;
            }
            if(rest > 0) result += toGematria(rest);
            // Add geresh/gershayim
            if(result.length === 1) result += '׳';
            else result = result.slice(0,-1) + '״' + result.slice(-1);
            return 'ה׳' + result;
        }

        function formatGregRange(start, end) {
            const sm = GREGORIAN_MONTHS_HE[start.getMonth()];
            const em = GREGORIAN_MONTHS_HE[end.getMonth()];
            if(start.getMonth() === end.getMonth()) {
                return `${start.getDate()}–${end.getDate()} ${sm} ${start.getFullYear()}`;
            }
            return `${start.getDate()} ${sm} – ${end.getDate()} ${em} ${end.getFullYear()}`;
        }

        function changeHebrewMonth(dir) {
            viewHMonth += dir;
            const maxMonths = hebrewMonthsInYear(viewHYear);
            if(viewHMonth > maxMonths) { viewHMonth = 1; viewHYear++; }
            if(viewHMonth < 1) { viewHYear--; viewHMonth = hebrewMonthsInYear(viewHYear); }
            buildCalendar();
        }

        function goToday() {
            viewHYear = todayHeb.year;
            viewHMonth = todayHeb.month;
            buildCalendar();
            selectHebDate(todayHeb.year, todayHeb.month, todayHeb.day);
        }

        async function selectHebDate(hy, hm, hd) {
            selectedHYear = hy;
            selectedHMonth = hm;
            selectedHDay = hd;
            buildCalendar();
            await showEntry(hy, hm, hd);
        }

        // ===== נתונים מקומיים =====
        // מפתח: "חודש-יום" לפי סדר עברי: תשרי=1, חשון=2, כסלו=3, טבת=4, שבט=5,
        // אדר/אדר-א=6, (אדר-ב=7 בשנת עיבור), ניסן=7/8, אייר=8/9 וכו׳
        const LOCAL_DATA = {
            "6-19": "החסידים, אפילו הבינונים, היו בקיאים בתנ\"ך. ומנהג מסודר היה אצלם, אשר אחר לימוד שיעור משניות שאחרי תפילת שחרית, בשעת קפילת [=קיפול] הטלית והתפילין היו אומרים שיעור תנ\"ך, באופן אשר במשך שלשה חדשים היו גומרים את התנ\"ך.",
            "6-20": "אין [במשמעותה של] 'עבודה' ש'עבודה' תהיה באמת, כי האמת היא עבודה בפני עצמה - שגם ה\"צפורן\" [=הטפל ביותר] תהיה אמיתית. מה אתה מתפעל [הרי מצינו בגמרא לגבי משה רבינו] \"מדת האמת ראה (סנהדרין קיא,א) ונפל על פניו\"!",
            "6-21": "שם חסיד הוא שם קדום הנמצא בדרז\"ל גם על אדם הראשון (עירובין יח,ב) והוא תואר השלימות וההפלגה, אם בשכל או במדות או בשניהם יחדיו. אמנם בתורת חסידות חב\"ד תואר חסיד הוא: מי שמכיר מהותו העצמי ומעמדו בידיעת התורה ולימודה ומצבו בקיום המצות; יודע הוא מה שחסר לו ונותן לב ודואג למלאות את החסר, ומרבה במשמעת בדרך קבלת עול.",
            "6-22": "אאמו\"ר [הרש\"ב] כותב באחד ממאמריו: הא [=ענין זה] דסעודה שלישית [מכוון כנגד הפעם השלישית שנאמר 'היום' בפרשת המן, והוא בלשון:] \"היום לא גו'\" - היינו שאין צריך פת, אבל צריך לטעום איזה דבר, ואמר ר' יוסי יהא חלקי מאוכלי ג' סעודות.\nתורת רבינו הזקן בתחילת בואו לליאזנא: \"לעולם יהא אדם זהיר בתפלת המנחה\" - יתרון תפלת המנחה על התפלות דשחרית וערבית הוא בזה, שהיא באמצע היום, בשעה שבניאדם עסוקים וטרודים בעניניהם, ומפסיקים לתפילת המנחה וזהו: לעולם, - עבודת האדם בעולם היא ש'יהא אדם' - שכל המאיר ופועל במדות, 'זהיר' - יאיר; היינו, התגברות הצורה על החומר. וזה ניכר בענין 'תפלת המנחה'.",
            "6-23": "הרבנים ובעלי תורה נקראים \"עיני העדה\" ו\"ראשי אלפי ישראל\", וכשהראש הוא בריא אזי גם הגוף בריא.",
            "6-24": "אדמו\"ר האמצעי ענה לר' הלל מפאריטש על שאלתו, אם יחזור חסידות גם בעיירות שאנשיהם אין להם מושג בחסידות: לדברי חסידות מאזינה הנשמה. וכתיב \"ונוזלים מן לבנון\" 'לבנון' - ל\"ב [כנגד ל\"ב נתיבות חכמה] נו\"ן [כנגד נ' שערי בינה. והיינו:] חכמה ובינה שבנשמה. - וכאשר הנשמה מקשיבה 'נוזל ונוטף' הדבר בהארת הנשמה המחיה את הנוף, ומכך נוצר חיזוק ב\"ועשה טוב\" שברמ\"ח מצוות-עשה וב\"סור מרע\" שבשס\"ה מצוות-לא-תעשה.",
            "6-25": "'הושיענו' אחר שיר של יום, אומרים הן בחול הן בשבת, יום טוב, ראש השנה ויום הכפורים.",
            "6-26": "בשלשה כלי שרת - אהבת ה' אהבת התורה, אהבת ישראל - צריכים צעירים בני תורה לגשת לעבוד בכרם ה' צבאות, לקרב לב אחיהם לקיום מצוות מעשיות וקביעות עתים לתורה - מבלי התחשב עם מחלת המפלגות. והאמת הגמור הוא, אשר לב ישראל הוא מעין מקור מים חיים, וברית כרותה לעבודה ותעמולה שאינן חוזרות ריקם.",
            "6-27": "אאמו\"ר [הרש\"ב] אמר: האמת היא דרך המיצוע. נטיה לימין - להחמיר על עצמו ולמצוא חסרונות באישיות העצמית או עניני עבירות שהם לא כפי האמת; נטיה לשמאל - להקל על עצמו, לחפות על חסרונות אישיים או להקל בעניני 'עבודה' בגלל אהבת עצמו - שניהם דרכים תועות.",
            "6-28": "בקריאת שמע שעל המטה: \"רבוש\"ע הריני מוחל\" וכן \"למנצח גו' בבוא\" - אין אומרים בשבת ויו\"ט, אבל צ\"ל בשאר ימים שאין אומרים בהם תחנון. בסיום הג' פרשיות אומרים תיבת \"אמת\". \"יעלזו חסידים\" - פעם אחת; \"הנה מטתו\" - ג' פעמים; \"יברכך\" - ג' פעמים. בתקון חצות אין אומרים \"למנצח גו' בבוא\" בימים שאין אומרים בהם תחנון.",
            "6-29": "באמירת לחיים יש שתי נוסחאות: א) לחיים טובים ולשלום, וטעם הברכה - להיות כי בשתיית היין הנזכרת בפעם הראשונה בתורה היו תוצאות לא טובים - \"ויחל נח גו'\", ועץ הדעת [מקור החטאים] - גפן היה, ולכן מברכים שיין זה יהיה לחיים טובים.\nב) הרב המגיד ממעזריטש היה עונה לחיים ולברכה. פעם בהתוועדות שהיה נוכח רבינו הזקן, ענה רבינו הזקן: לחיים ולברכה. אחרי ההתוועדות שוחחו החסידים בטעם נוסח זה, ששמעו אז פעם הראשונה. אחד החסידים אמר, אשר להיות כי נכנס יין יצא סוד, ובעבודה - הוא התגלות המדות, לכן זקוקים לברכה. והנוסח הוא \"לחיים ולברכה\" - אותיות לב-רכה. ה\"צמח צדק\" אמר על זה: זאת יכול לאמר חסיד, שהתפלל ועסק בעבודת ה' שלושים שנה.",
            "7-1": "כל החדש אין אומרים תחנון. אחר אמירת הנשיא אומרים יהי רצון הנדפס בסידור \"תורה - אור\", וגם כהנים ולויים אומרים אותו.\nאאמו\"ר [הרש\"ב] ציוה לגיסו הרמ\"ה [הר' משה הורנשטיין] הכהן לאמר ה\"יהי רצון\" שאחר ה\"נשיא\", ואמר לו כי אפילו כהן ולוי [שהינו ודאי משבט לוי] צריך לאומרו, [אף שמוזכר שם \"ואם אני משבט (פלוני)..\" - המשתנה בכל יום ומתייחס לשבטו של הנשיא של אותו יום -] כי זה שייך לעיבור [=נשמה משבט אחר המתעברת בנשמתו].",
            "7-2": "הילולא של כ\"ק אאמו\"ר [הרש\"ב] נסתלק אור ליום א. ב ניסן שנת תר\"ף בראסטאב. ושם מנוחתו כבוד [=קבורתו].\nמאמר הראשון אשר אמרו ברבים, אחרי הסתלקות אביו: ביום השני של חג הסוכות תרמ\"ג, ומתחיל \"כתר יתנו לך כו'\". מאמר - ברבים - האחרון בהיותו בעלמא דין [=עולם הזה]: בסעודת פורים תר\"ף, ומתחיל \"ראשית גוים עמלק גו' קץ שם לחושך\".",
            "7-3": "משיעורי [התורה הקבועים של] אאמו\"ר [הרש\"ב]: בכל יום פרשה חומש עם פירש\"י. אמירת תנ\"ך בעל-פה: קאפ' [=פרק] אחד מתורה וכן מנביאים וכן מכתובים. פרק אחד משניות, שיעור גמרא לעיוני ב' דפים לשבוע, שיעור למיגרס [=ללא עיון והתעמקות מיוחדים] ד' דפים ליום, שיעור בירושלמי. גם שיעור - לא בכל יום - בפוסקים. במשך השנה היה מסיים כל המדרש - רבה: לווה [=משאיר 'חוב'] בסדרות [=פרשות] הארוכות ופורע [=משלים החובות] בקצרות.",
            "7-4": "עבודת בעלי עסקים מתחלקת לשני סעיפים עיקריים:\nא) העבודה עם עצמו. בעת עסקו ממש בשעה הפנויה, בישבו בחנות וכדומה, ילמוד משנה משניות, פרק תניא, ויהיו לו איזה דברי תורה, כמו חומש, משניות, תהלים ותניא, שיהיה בקי בהם בעל-פה, למען שיוכל לחזור עליהם בהלכו ברחוב, בשוק וכדומה.\nב) העבודה עם זולתו, בעת הדיבור בעניני עסק יסבב הדיבור לספר איזה סיפור תוכני, ולמצוא עליה וסיבה לעורר על דבר לימוד וכיוצא בזה.",
            "7-5": "ב'רצה' דברכת המזון אומרים \"בעל הישועות\" - בית דגושה, ו\"ובעל הנחמות\" - בית רפויה.\nאאמו\"ר [המהר\"ש] אמר במרז\"ל \"לא מקומו של אדם מכבדו, אלא אדם מכבד את מקומו\", כבוד יש בו שני פירושים: לשון כבדא כמארז\"ל \"כבד לב פרעה - שנעשה לבו ככבד\" ולשון כבוד, גילוי אור מקיף נעלה וזהו: \"לא מקומו של אדם מכבדו\" - כלומר מקררו, אלא 'אדם מכבד את מקומו', שניתן לו כח ועוז להאיר את מקומו באור תורה ועבודה, כשם דבירידת הנשמה בגוף משביעים אתו תהא צדיק, דשבועה זו הוא ענין השובע בכוחות נעלים שתוכל להשלים כוונת ירידתה, הנה כן הוא בכל אדם ואדם מקום שהוא.",
            "7-6": "הנסיון הראה, אשר כשממעטים בחקירות, ועובדים בסדר ובתוקף, ע\"פ הנעימות של תורה, ימין מקרבת ושמאל דוחה, אזי פועלים בודאי, ובפרט בענינים העקריים מעיקרי הדת.",
            "7-7": "נוסח ויהי בנסוע: וכרצון כל עמך בית ישראל.\nכינוי משפחה של רבינו הזקן: ברוכאוויטש.\nכינוי משפחה של בנו אדמו\"ר האמצעי: שניאורי.\nכינוי משפחה של ה\"צמח צדק\": שניאורסאהן.",
            "7-8": "כל נשמה יש לה עבודה פרטית במוחין ומדות כפי טבעה וענינה, וכתיב \"מאויבי תחכמני\", מההטיות הרעות שמרגיש במדותיו הטבעיות, מזה מתחכם ויודע איך לכלכל תיקון מדותיו ושעבוד הכוחות שלו בעבודת השי\"ת.",
            "7-9": "העושר היהודי אינו בבתים וממון; העושר היהודי הנצחי הוא כשאנו יהודים שומרי תורה ומצוות, ומביאים לעולם בנים וצאצאים שומרי תורה ומצוות.",
            "7-10": "בדבר התעמולה בענין טהרת המשפחה במושבו, יתבונן בזה: אילו יצוייר, אשר ה' אנה לידו להציל מושב יהודים מכליון, ר\"ל, הנה בטח היה מוסר נפשו על זה, והיה מהלל ומשבח את השי\"ת, על גודל החסד לזכותו בזכות גדול כזה, כן, ויותר מכן, היא תעמולה זו, שהיא מצלת נפשות ממש.",
            "7-11": "ביום ההולדת על האדם להתבודד, ולהעלות זכרונויתיו ולהתבונן בהם, הצריכים תיקון ותשובה - ישוב ויתקנם.",
            "7-12": "מזמן יציאת מצרים נקראו בני ישראל - צבאות ה'. ההפרש בין עבדים - שנקראו כן בנ\"י - וצבאות, הוא: עבד עושה עבודת רבו - ובזה כמה דרגות: נוקב מרגליות, עושה שאר מלאכות, עושה מלאכות פשוטות - ויש בזה יגיעה ועמל רב, אבל אין זה ענין של מסירות נפש. 'צבא' הם עבדים שעובדים ביגיעה רבה ועמל ובמסירות נפש, הן במלחמת הגנה והן במלחמת תנופה, ועומדים על משמרתם בתכלית התוקף מבלי התפעל מהמנגד ושונא, ועבודתם זו אינה ענין של השגה, כי הם מתנהגים ע\"פ הוראת מצביאם. והנה נשמות ישראל במצרים היו בתכלית השפלות בעינויים קשים ומרים, ועם זה לא שינו שמם ולשונם ולבושיהם, ועמדו על משמרתם בתכלית החוזק, כי ידעו שהקב\"ה הבטיח לגאול אותם, והמתנהג כזה במצב זה - הוא מצבא ה', דה' עוזרו בדרך מלמעלה מן הטבע בטבע.",
            "7-13": "הילולא של כ\"ק ה\"צמח צדק\". נסתלק שנת תרכ\"ו בליובאוויטש, ושם מנוחתו כבוד [=קבורתו].\nמספורי אאמו\"ר [המהר\"ש]: הצ\"צ התחיל לכתוב נגלה ודא\"ח [=דברי אלוקים חיים, חסידות] בהיותו בן שתים עשרה שנה.",
            "7-14": "בבית רבינו נוהגים שלא לעשות את הרב למורשה, אלא למכור לו את החמץ ובערב קבלן.\nבאפיית השמורה ערב פסח אחר חצות, היה אאמו\"ר [הרש\"ב] נוכח, ואומר גם-כן \"הלל\", והיה מפסיק - גם באמצע פרק - להורות בהנוגע להלישה, אפיה וכהאי גוונא [=וכדומה].",
            "7-15": "למרור וחזרת - הן חריין [=חזרת] והן סאלאט [=חסה]. קידוש בעמידה. הא לחמא - ה[אות] \"הא\" בצירי. בברכת אכילת מרור מכוונים גם על מרור שבכורך.\nבסדר הראשון היה אאמו\"ר [הרש\"ב] מקצר בכדי לאכול האפיקומן לפני חצות, אבל בשני היה מאריך. מתחיל לפני שעה ט וגומרו בשעה ג-ד אחר חצות, והיה מאריך בביאור ההגדה.\nאדמו\"ר הזקן אמר: [המצה היא] מיכלא דמיהמנותא [=\"מאכל האמונה\"] - לילה הראשון, מיכלא דאסותא [=\"מאכל הרפואה\"] לילה השני. כאשר הרפואה מביאה [=גוררת] את האמונה, בכך שאומר \"תודה לך הבורא על רפואתי\" - הרי היה הוא חולה. אך כשהאמונה מביאה את הרפואה - אין כאן חולי מלכתחילה.",
            "7-16": "גם מי שאין לו אב, ר\"ל אומר לפני 'מה נשתנה': \"טאטע איך וועל בא דיר פרעגן פיר קשיות\" [=אבא, אשאל אותך ארבע קושיות]. וסמוכות [=כעין ראיה] לזה, שגם מי שאין לו אב ואם, רחמנא ליצלן, צריך לומר בברכת המזון \"הרחמן הוא יברך את אבי מורי כו' אמי מורתי כו'\".",
            "7-17": "[מההגדה: \"וכל המרבה לספר ביציאת מצרים] הרי זה משובח\" - 'זה', מורה על מדריגה דקדושה, \"הנה אלקינו זה\": ו'כל המרבה כו' - 'זה' שלו הוא משובח.",
            "7-18": "במנחה אין אומרים הודו, אבל אומרים פתח אליהו.\nשנת תר\"ח אמר ה\"צמח צדק\" מאמר על הפסוק \"אם כסף תלוה גו'\", כסף הוא הנשמה, על-שם שהיא תמיד בכוסף [=בכיסופין] ותשוקה לעלות למעלה, וכדכתיב \"רוח האדם היא העולה למעלה\" - \"האדם\" הם נשמות ישראל, \"אתם קרויים אדם\" - והנשמה נתונה בהלואה להאדם, וכתיב \"ימים יוצרו גו'\", דיש מספר קבוע כו', ו[כש]חסר יומא חדא - חסר לבושא חדא.",
            "7-19": "גם בשמחה ובצהלה. שלום עליכם, אשת חיל, מזמור לדוד, דא היא סעודתא, ויתן לך - אומרים - בלחש.\nפעם פירש אאמו\"ר [הרש\"ב]: מה נשתנה הלילה - גלות שנמשל ללילה - הזה - האחרון - מכל הלילות - גלויות שקדמוהו. שבכל הלילות אין אנו מטבילין - לשון מרוק, נקיון וטהרה - אפילו פעם אחת - לא נגמר המירוק בהם, כי הרי היה אחריהם עוד גלות - הלילה הזה שתי פעמים - מירוק גוף וגילוי הנפש. שבכל הלילות אנו אוכלין חמץ או מצה - היינו כי גם אחר הגלות, העבודה היא מצד נפש האלוקית, מצה ביטול, ומצד נפש הבהמית, חמץ ישות - הלילה הזה - אחר גלות האחרון - כולו מצה - שיועבר רוח הטומאה. שבכל הלילות אנו אוכלין שאר ירקות - [על פי מאמר רז\"ל] \"כל המקנא פניו מוריקות\" ובכל הגלויות הרבה בחי' בקנאה: קנאת סופרים והדומה - הלילה הזה - אחר גלות האחרון - כולו מרור - קנאה היותר גדולה, ע\"ד מרז\"ל \"כל צדיק נכוה מחופתו של חבירו\". שבכל הלילות אנו אוכלין בין יושבין בין מסובין - כל הגילויים שעל ידי הגלויות - 'אוכלין' - בחי' התענוג, ויש התפשטות התענוג ותענוג העצמי ויש מי שמגיע בעבודתו להתפשטות התענוג ויש לתענוג העצמי - הלילה הזה - אחר גלות האחרון - כולנו מוסבין - שכל ישראל יגיעו לבחי' תענוג העצמי.",
            "7-20": "פעם נכנס כ\"ק הר' חיים אברהם (בן רבינו הזקן) אל אדמו\"ר האמצעי בחג הפסח לאמר גוט יום טוב [\"חג שמח\"]. וסיפר אז - הרח\"א - שרבינו הזקן אמר: בפסח אין האחד מכבד את זולתו באכילה ושתיה, אך ליטול ביוזמה עצמית - מותר.",
            "7-21": "בליובאוויטש היו נעורים בשביעי של פסח, וגם בשבועות והושענא רבה. מאז היותי בגיל תשע, לא נשכבתי לישון בשביעי של פסח - יש ללמוד כל הלילה.",
            "7-22": "ביום מהדרים: לקדש, אח\"כ מתפללים תפלת המנחה, ואחר-זה סעודת יום-טוב.\nהבעל-שם-טוב היה אוכל ג' סעודות באחש\"פ [=אחרון-של-פסח].\nסעודת אחרון של פסח היתה נקראת - אצל הבעש\"ט - \"סעודת משיח\". \"סעודת משיח\" היא באחש\"פ, כי באחש\"פ מאיר גילוי הארת המשיח.\nבשנת תרס\"ו התחיל הסדר, אשר תלמידי תומכי תמימים יאכלו יחד בחג הפסח בהיכל הלימוד והיו אז ש\"י [=310] תלמידים וח\"י [=18] שולחנות, סעודת אחש\"פ אכל אאמו\"ר [הרש\"ב] ביד עם התלמידים, וציווה לתת לכל תלמיד ד' כוסות, ואמר אז: זוהי סעודת משיח.",
            "7-23": "קיים הענין שאחש\"פ הוא גילוי [מציאותו של] המשיח, ששייך לכל ישראל. פסח ענינו 'מדלג' ו'ליל שימורים', ובכלל בולטת החירות, ואחר מכן נקלעים לתוך העולם - ולכך הוא הגילוי ממציאות המשיח, התוקף הניתן כדי לאפשר ההליכה בעולם.",
            "7-24": "נוהגים שאין מברכים שהחיינו בימי ספירת העומר.\nה'לא טוב' נמצא בכולנו. שעיר לעזאזל הוא מעבודות בית המקדש. מפני שישנו בנברא 'לא טוב' - יש לשלחו לארץ גזרה.",
            "7-25": "העבודה היא בכל אדם לפי מהותו ומעלתו. מי שיש בידו לנקוב [=לדלות ממעמקי הים] מרגליות או ללטוש אבנים טובות ועוסק בעבודת מלאכת אפיית לחם - ומובן דוגמת כל זה בעבודה [בקדושה] - הגם שהיא עבודה ומלאכה הנצרכת במאוד, בכל זה לחטא יחשב לאיש ההוא.",
            "7-26": "מברכים ר\"ח אייר. אמרים כל התהלים בהשכמה, יום התוועדות. הפטורה: הלא כבני כושיים.\nמשיחת אאמו\"ר [הרש\"ב]: חסידות תובעת \"ורחץ את בשרו במים ולבשם\". כלומר: השכלת החסידות בהכרח שתרחוץ הבשר, ותשטוף את ה\"את בשרו\" - את הטפל לבשרו, כל ההרגלים שהבשר מרגיל - ואז אפשר ללבוש בגדי קודש. מחשבת ודבור חסידות והנהגתם של חסידים בהתבוננות קודם התפלה - \"בגדי קודש הם\": אלו בגדים שניתנו מן הקודש, אך את ה\"ורחץ במים את בשרו\" - יש לעשות באופן עצמאי. לבושי הנפש ניתנים מלמעלה, אך רחיצת הטפל שנוצר מהבשריות, ולהפוך את הבשר לבשר קודש - זהו רק בכח עצמו, וזאת תובעת החסידות, ועל-כך מסר רבנו הגדול [אדמוה\"ז] את נפשו: הוא פתח את צנור מסירות הנפש על עבודת ה' בתפילה, להיות קשורים לעצמות אין סוף, חסידות מציבה חסיד פנים אל פנים עם עצמות אין סוף.",
            "7-27": "דברים המותרים אם עושה אותם להנאתו הם רע גמור כמ\"ש רבינו נ\"ע (תניא פ\"ז) לפי ש\"קדש עצמך במותר לך\". צריך להכניס קדושה בדברים המותרים שיהיה בהם תכלית של תורה ומצוות יראת שמים ומדות טובות.",
            "7-28": "החסידים שאלו את אדמו\"ר הזקן: איזה עבודה נעלית יותר, אהבת ה' או אהבת ישראל. ויען: אהבת ה' ואהבת ישראל שתיהן כאחת חקוקות בנשמתו רוחו ונפשו של כל אחד מישראל, ומקרא מלא דיבר הכתוב \"אהבתי אתכם אמר ה'\", הרי דגדולה אהבת ישראל, דאוהב מה שהאהוב אוהב.",
            "7-29": "הקדמת ה\"לקוטי תורה על ג' פרשיות\", [ספר חסידות על ג' פרשיות ראשונות שבתורה] \"להבין ענין נפש האלוקית, הנה כתיב לא תאכלו\" הוא מאמר שאמרו רבנו הזקן לפני ה\"צמח צדק\", וחזרו הצ\"צ לפניו, ויאמר רבינו הזקן: נו, הטעמה? ויכתוב הצ\"צ הנחה עם הגהות במוקף. רבינו הגיה ההנחה, ויצוו להכניס ההגהות בפנים המאמר. על-פי הצעת אאמו\"ר [הרש\"ב] בחרו במאמר זה בתור הקדמה לה\"לקוטי-תורה\".",
            "7-30": "ההתוועדות דסעודה שלישית, שבת מברכים, ויומי דפגרא - בראשי חדשים ומועדי אנ\"ש [=אנשי שלומנו] - צריכים להתקיים בביהכנ\"ס. ההתוועדות דמלוה מלכה - אצל אנ\"ש שי' בבתיהם הפרטיים."
        };

        // ===== SEFARIA API =====
        const entryCache = {};

        function hebrewDayOfYear(hy, hm, hd) {
            let day = 0;
            for (let m = 1; m < hm; m++) day += hebrewMonthDays(hy, m);
            return day + hd;
        }

        async function fetchSefariaEntry(hy, hm, hd) {
            // בדוק קודם בנתונים המקומיים (מפתח: חודש-יום ללא שנה)
            const localKey = `${hm}-${hd}`;
            if (LOCAL_DATA[localKey]) return LOCAL_DATA[localKey];

            const cacheKey = `${hy}-${hm}-${hd}`;
            if (entryCache[cacheKey] !== undefined) return entryCache[cacheKey];

            const dayNum = hebrewDayOfYear(hy, hm, hd);
            const url = `https://www.sefaria.org/api/texts/Hayom_Yom.${dayNum}?lang=he&commentary=0`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();

                // Sefaria returns Hebrew text in data.he (array of strings or nested)
                let text = '';
                if (Array.isArray(data.he)) {
                    // Flatten nested arrays
                    text = flattenSefariaText(data.he);
                } else if (typeof data.he === 'string') {
                    text = data.he;
                }

                // Strip HTML tags from Sefaria response
                text = text.replace(/<[^>]*>/g, '').trim();

                entryCache[cacheKey] = text || null;
                return entryCache[cacheKey];
            } catch (e) {
                console.warn('Sefaria fetch failed:', e);
                entryCache[cacheKey] = null;
                return null;
            }
        }

        function flattenSefariaText(arr) {
            if (!Array.isArray(arr)) return arr || '';
            return arr.map(item => flattenSefariaText(item)).filter(Boolean).join('\n');
        }

        // ===== SHOW ENTRY =====
        async function showEntry(hy, hm, hd) {
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('emptyState');
            const entryContent = document.getElementById('entryContent');
            loader.style.display = 'block';
            emptyState.style.display = 'none';
            entryContent.style.display = 'none';

            const monthName = hebrewMonthName(hy, hm);
            const hebStr = `${toGematria(hd)} ב${monthName}`;
            const gregDate = jdnToGregorian(hebrewToJDN(hy, hm, hd));
            const gregStr = `${DOW_HE[gregDate.getDay()]} · ${gregDate.getDate()} ${GREGORIAN_MONTHS_HE[gregDate.getMonth()]} ${gregDate.getFullYear()}`;

            document.getElementById('entryDateHeb').textContent = hebStr;
            document.getElementById('entryDateGreg').textContent = gregStr;

            // Fetch from Sefaria
            const entryText = await fetchSefariaEntry(hy, hm, hd);

            if (entryText) {
                // Split into paragraphs on newlines
                const paragraphs = entryText.split('\n').filter(p => p.trim());
                document.getElementById('entryBody').innerHTML =
                    paragraphs.map(p => `<p style="margin-bottom:1.2rem">${p}</p>`).join('');
            } else {
                document.getElementById('entryBody').innerHTML =
                    `<p style="color:var(--text-dim);text-align:center;font-size:1rem;line-height:2;opacity:0.6;">
                        לא נמצא תוכן ליום זה<br>
                        <span style="font-size:0.75rem;">נסה לבדוק חיבור לאינטרנט</span>
                    </p>`;
            }

            document.getElementById('entrySource').textContent = `— היום יום · ${hebStr} —`;
            document.getElementById('dayCounter').textContent = `${toGematria(hd)} / ${toGematria(hebrewMonthDays(hy, hm))}`;
            document.getElementById('btnPrev').disabled = (hd <= 1 && hm <= 1);
            document.getElementById('btnNext').disabled = false;


            loader.style.display = 'none';
            entryContent.style.display = 'block';
            entryContent.classList.remove('animate-in');
            void entryContent.offsetWidth;
            entryContent.classList.add('animate-in');
            document.getElementById('contentCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }



        async function navigateEntry(dir) {
            if(selectedHDay == null) return;
            let hy = selectedHYear, hm = selectedHMonth, hd = selectedHDay + dir;
            const maxDays = hebrewMonthDays(hy, hm);
            if(hd > maxDays) {
                hm++;
                const maxMonths = hebrewMonthsInYear(hy);
                if(hm > maxMonths) { hy++; hm = 1; }
                hd = 1;
            }
            if(hd < 1) {
                hm--;
                if(hm < 1) { hy--; hm = hebrewMonthsInYear(hy); }
                hd = hebrewMonthDays(hy, hm);
            }
            selectedHYear = hy;
            selectedHMonth = hm;
            selectedHDay = hd;
            viewHYear = hy;
            viewHMonth = hm;
            buildCalendar();
            await showEntry(hy, hm, hd);
        }

        function shareToWhatsapp() {
            let dateStr = 'היום יום';
            if(selectedHDay != null) {
                dateStr = `${toGematria(selectedHDay)} ${hebrewMonthName(selectedHYear, selectedHMonth)}`;
            }
            const text = `מזמין אותך לקרוא היום יום: ${dateStr}\n${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // ===== INIT =====
        buildCalendar();
        selectHebDate(todayHeb.year, todayHeb.month, todayHeb.day);
    </script>

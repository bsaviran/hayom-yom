<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היום יום</title>
    <meta property="og:description" content="הצטרפו לקריאת היום יום של הרבי זצוק"ל.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23c9a84c'/%3E%3Cstop offset='100%25' stop-color='%23e8c97a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='serif' font-size='56' font-weight='900' fill='%2305101f'%3E%D7%99%3C/text%3E%3C/svg%3E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="היום יום">
    <meta name="theme-color" content="#0a1628">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: rgba(201,168,76,0.15);
            --deep: #05101f;
            --navy: #0a1628;
            --navy-mid: #112240;
            --navy-light: #1a3358;
            --text: #f0e8d6;
            --text-dim: #8aa0b8;
            --silver: #8fa3bc;
            --silver-dim: rgba(143,163,188,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(26,51,88,0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(10,22,40,0.9) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* === HEADER === */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5,16,31,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,168,76,0.2);
            padding: 0 2rem;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--deep);
            box-shadow: 0 0 20px rgba(201,168,76,0.3);
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            display: block;
        }

        .logo-subtitle {
            font-size: 0.65rem;
            color: var(--gold);
            font-family: 'Heebo', sans-serif;
            font-weight: 400;
            line-height: 1.2;
            display: block;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-whatsapp {
            width: 42px;
            height: 42px;
            background: rgba(37,211,102,0.15);
            border: 1px solid rgba(37,211,102,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #25d366;
        }
        .btn-whatsapp:hover { background: rgba(37,211,102,0.25); transform: scale(1.08); }

        .btn-today {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--deep);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(201,168,76,0.25);
            white-space: nowrap;
        }
        .btn-today:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }

        /* === MAIN === */
        main {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem 5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.5s ease forwards; }

        /* === RABBI TRIBUTE === */
        .rabbi-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .rabbi-frame-outer {
            display: inline-block;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            padding: 30px;
            margin: -30px;
        }

        .rabbi-glow {
            position: absolute;
            inset: -30px;
            background: radial-gradient(ellipse at center, rgba(201,168,76,0.3) 0%, transparent 70%);
            border-radius: 24px;
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .rabbi-frame {
            width: 360px;
            height: 240px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow:
                0 0 0 6px rgba(201,168,76,0.15),
                0 0 0 12px rgba(201,168,76,0.07),
                0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            z-index: 1;
            display: block;
        }

        .rabbi-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: sepia(10%) brightness(0.95) contrast(1.05);
            transition: transform 0.6s ease;
        }

        .rabbi-frame:hover img { transform: scale(1.04); }

        .rabbi-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 1.4rem 0 0.6rem;
        }

        .rabbi-ornament-line {
            height: 1px;
            width: 80px;
            background: linear-gradient(to var(--d), transparent, rgba(201,168,76,0.5));
        }
        .rabbi-ornament-line.left { --d: left; }
        .rabbi-ornament-line.right { --d: right; }

        .rabbi-ornament-star { color: var(--gold); font-size: 1rem; letter-spacing: 0.2em; }

        .rabbi-name {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold-light);
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
            text-align: center;
        }

        .rabbi-sub {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.7;
        }

        .rabbi-zl {
            font-size: 0.8rem;
            color: rgba(201,168,76,0.6);
            margin-top: 0.3rem;
            font-family: 'Noto Serif Hebrew', serif;
            text-align: center;
        }

        /* === BOOK TITLE BANNER === */
        .book-banner {
            position: relative;
            max-width: 680px;
            margin: 0 auto 2.5rem;
            text-align: center;
            padding: 1.8rem 2.5rem;
        }

        .book-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, rgba(17,34,64,0.7) 50%, rgba(201,168,76,0.1) 100%);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 20px;
        }

        .book-banner-shimmer {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            overflow: hidden;
            pointer-events: none;
        }

        .book-banner-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.06) 50%, transparent 100%);
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(100%); }
        }

        .book-title-he {
            position: relative;
            z-index: 1;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.08em;
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
            margin-bottom: 0.4rem;
        }

        .book-subtitle-he {
            position: relative;
            z-index: 1;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .book-year {
            position: relative;
            z-index: 1;
            font-size: 0.75rem;
            color: rgba(201,168,76,0.55);
            margin-top: 0.6rem;
            font-family: 'Heebo', sans-serif;
            letter-spacing: 0.1em;
        }

        /* === DATE SELECTOR === */
        .ornament-divider {
            text-align: center;
            margin: 2.5rem 0;
            position: relative;
        }
        .ornament-divider::before, .ornament-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: linear-gradient(to var(--dir, left), transparent, rgba(201,168,76,0.4));
        }
        .ornament-divider::before { right: 0; --dir: right; }
        .ornament-divider::after { left: 0; --dir: left; }
        .ornament-divider span {
            color: var(--gold);
            font-size: 1.4rem;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3em;
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1.2rem;
        }

        .month-nav-btn {
            width: 38px;
            height: 38px;
            background: var(--navy-mid);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 50%;
            color: var(--gold);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .month-nav-btn:hover { background: var(--gold-dim); border-color: var(--gold); }

        .month-label {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--gold-light);
            min-width: 180px;
            text-align: center;
        }

        .calendar-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.2rem;
            text-align: center;
            font-weight: 500;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 7px;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .days-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
        }

        .day-card {
            background: var(--navy-mid);
            border: 1px solid rgba(201,168,76,0.12);
            border-radius: 13px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
        }

        .day-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-dim), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }

        .day-card:hover::before, .day-card.today::before, .day-card.selected::before { opacity: 1; }

        .day-card:hover, .day-card.today, .day-card.selected {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(201,168,76,0.1);
        }

        .day-card.today {
            box-shadow: 0 0 0 1px var(--gold), 0 8px 25px rgba(201,168,76,0.2);
        }

        .day-card.selected {
            background: rgba(201,168,76,0.15);
        }

        .today-badge {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--deep);
            font-size: 0.42rem;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .day-num {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            position: relative;
            z-index: 1;
        }

        .day-card.today .day-num, .day-card.selected .day-num { color: var(--gold-light); }

        .day-heb {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.6rem;
            color: var(--text-dim);
            position: relative;
            z-index: 1;
            margin-top: 2px;
        }

        .day-card.read-mark::after {
            content: '✓';
            position: absolute;
            bottom: 3px;
            right: 5px;
            font-size: 0.5rem;
            color: #4ade80;
            z-index: 2;
        }

        /* === CONTENT CARD === */
        .content-card {
            background: linear-gradient(160deg, var(--navy-mid) 0%, rgba(10,22,40,0.95) 100%);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
        }

        .card-topbar {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            box-shadow: 0 0 20px rgba(201,168,76,0.5);
        }

        .card-inner {
            padding: 2.5rem 2rem;
        }

        @media (min-width: 600px) { .card-inner { padding: 3.5rem 4rem; } }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
        .empty-text {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.4rem;
            color: var(--text-dim);
            line-height: 1.7;
        }
        .empty-hint { margin-top: 0.8rem; font-size: 0.85rem; color: var(--gold); opacity: 0.7; }

        .entry-date-line {
            text-align: center;
            margin-bottom: 2rem;
        }

        .entry-date-heb {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201,168,76,0.3);
            letter-spacing: 0.04em;
        }

        .entry-date-greg {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .entry-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1rem auto;
        }

        .entry-body {
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1.45rem;
            line-height: 2.4;
            color: var(--text);
            text-align: right;
        }

        @media (min-width: 600px) { .entry-body { font-size: 1.65rem; } }

        .entry-source {
            margin-top: 2rem;
            text-align: center;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 0.85rem;
            color: rgba(201,168,76,0.6);
            font-style: italic;
        }

        .mark-read-wrap {
            text-align: center;
            margin-top: 2.5rem;
        }

        .btn-mark-read {
            background: var(--navy-mid);
            border: 1.5px solid rgba(201,168,76,0.3);
            border-radius: 50px;
            color: var(--text-dim);
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-mark-read:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
        .btn-mark-read.done { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.5); color: #4ade80; }
        .btn-mark-read.done:hover { background: rgba(220,38,38,0.1); border-color: rgba(220,38,38,0.4); color: #f87171; }

        .day-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(201,168,76,0.15);
        }

        .nav-btn {
            background: none;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 12px;
            color: var(--gold);
            padding: 10px 18px;
            font-family: 'Noto Serif Hebrew', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover { background: var(--gold-dim); border-color: var(--gold); transform: translateY(-1px); }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

        .day-counter { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }

        #loader {
            text-align: center;
            padding: 5rem;
            display: none;
        }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(201,168,76,0.15);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--text-dim); font-family: 'Noto Serif Hebrew', serif; font-size: 1.1rem; }

        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(201,168,76,0.1);
            padding: 2rem;
            text-align: center;
            background: rgba(5,16,31,0.6);
        }
        .footer-text { font-size: 0.8rem; color: var(--text-dim); }
        .footer-text span { color: var(--gold); }

        @media (max-width: 480px) {
            header { padding: 0 1rem; }
            .header-inner { height: 60px; }
            .logo-icon { width: 36px; height: 36px; font-size: 1.1rem; border-radius: 9px; }
            .logo-text { font-size: 0.9rem; }
            .logo-subtitle { font-size: 0.55rem; }
            .btn-today { padding: 8px 12px; font-size: 0.75rem; }
            .btn-whatsapp { width: 36px; height: 36px; }
            main { padding: 1.5rem 1rem 4rem; }
            .rabbi-frame { width: 280px; height: 185px; border-radius: 16px; }
            .rabbi-name { font-size: 1.2rem; }
            .book-title-he { font-size: 1.7rem; }
            .book-banner { padding: 1.4rem 1.2rem; }
            .card-inner { padding: 1.8rem 1.2rem; }
            .entry-body { font-size: 1.2rem; line-height: 2.2; }
            .entry-date-heb { font-size: 1.3rem; }
            .ornament-divider { margin: 1.5rem 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">י</div>
                <div>
                    <span class="logo-text">היום יום</span>
                </div>
            </div>
            <div class="header-actions">

        function toGematria(num) {
            const letters = {1:'א',2:'ב',3:'ג',4:'ד',5:'ה',6:'ו',7:'ז',8:'ח',9:'ט',10:'י',20:'כ',30:'ל',40:'מ',50:'נ',60:'ס',70:'ע',80:'פ',90:'צ',100:'ק',200:'ר',300:'ש',400:'ת'};

            if (num < 100) {
                let tens = Math.floor(num/10)*10, units = num%10;
                let res = letters[tens] + (units ? letters[units] : '');
                return res.replace('יה','טו').replace('יו','טז');
            }
            if (num < 200) return letters[100] + (num-100 ? toGematria(num-100) : '');

        function hebrewIsLeap(y) { return ((7*y)+1)%19 < 7; }
        function hebrewElapsed(y) {

            const h = 5+12*m+793*Math.floor(m/1080)+Math.floor(p/1080);

            return ad;

        function hebrewYearStart(y) { return hebrewElapsed(y)+347997; }
        function hebrewMonthDays(y, m) {
            if([2,4,6,10,13].includes(m)) return 29;
            if(m===12&&!hebrewIsLeap(y)) return 29;

        }

        function goToday() {
            currentViewDate = new Date(today);
            buildCalendar();
            selectDate(new Date(today));
        }

        function selectDate(date) {
            selectedDate = date;
            buildCalendar();
            showEntry(date);
        }

        function showEntry(date) {
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('emptyState');
            const entryContent = document.getElementById('entryContent');
            loader.style.display = 'block';
            emptyState.style.display = 'none';
            entryContent.style.display = 'none';
            setTimeout(() => {
                const hDate = getHebrewDate(date);
                const monthName = hebrewMonthName(hDate.year, hDate.month);
                const hebStr = `${toGematria(hDate.day)} ב${monthName}`;
                const gregStr = `${DAY_NAMES_HE[date.getDay()]} · ${date.getDate()} ${GREGORIAN_MONTHS_HE[date.getMonth()]} ${date.getFullYear()}`;
                document.getElementById('entryDateHeb').textContent = hebStr;
                document.getElementById('entryDateGreg').textContent = gregStr;
                const entryData = HAYOM_YOM_DATA[hDate.month + '-' + hDate.day];
                const entryText = entryData && entryData.text ? entryData.text : '';
                if (entryText) {
                    document.getElementById('entryBody').innerHTML = `<p>${entryText}</p>`;
                } else {
                    document.getElementById('entryBody').innerHTML = `<p style="color:var(--text-dim);text-align:center;font-size:1rem;line-height:2;opacity:0.6;">המלל ליום זה טרם הוזן<br><span style="font-size:0.8rem;">${hebStr}</span></p>`;
                }
                document.getElementById('entrySource').textContent = `— היום יום · ${hebStr} —`;
                document.getElementById('dayCounter').textContent = `${date.getDate()} / ${new Date(date.getFullYear(), date.getMonth()+1, 0).getDate()}`;
                document.getElementById('btnPrev').disabled = date.getDate() <= 1 && date.getMonth() === 0;
                document.getElementById('btnNext').disabled = false;
                updateMarkReadBtn(date);
                loader.style.display = 'none';
                entryContent.style.display = 'block';
                entryContent.classList.remove('animate-in');
                void entryContent.offsetWidth;
                entryContent.classList.add('animate-in');
                document.getElementById('contentCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        function updateMarkReadBtn(date) {
            const btn = document.getElementById('btnMarkRead');
            const icon = document.getElementById('markReadIcon');
            const text = document.getElementById('markReadText');
            const read = isRead(date);
            btn.className = 'btn-mark-read' + (read ? ' done' : '');
            icon.textContent = read ? '✓' : '☐';
            text.textContent = read ? 'קראתי! (לחץ לביטול)' : 'קראתי';
        }

        function toggleRead() {
            if(!selectedDate) return;
            toggleReadDate(selectedDate);
            updateMarkReadBtn(selectedDate);
            buildCalendar();
        }

        function navigateEntry(dir) {
            if(!selectedDate) return;
            const d = new Date(selectedDate);
            d.setDate(d.getDate() + dir);
            selectedDate = d;
            currentViewDate = new Date(d);
            buildCalendar();
            showEntry(d);
        }

        function shareToWhatsapp() {
            const dateStr = selectedDate ? `יום ${selectedDate.getDate()} ${GREGORIAN_MONTHS_HE[selectedDate.getMonth()]}` : 'היום יום';
            const text = `מזמין אותך לקרוא היום יום: ${dateStr}\n${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        buildCalendar();
        selectDate(new Date(today));
    </script>
